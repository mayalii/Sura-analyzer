<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sura – Light Pollution Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:      #0D1117;
      --surface: #1A2633;
      --accent:  #4D759E;
      --muted:   #8899AA;
      --light:   #CCDDEE;
      --navy:    #1E3A5F;
      --white:   #FFFFFF;
    }
    html, body { height: 100%; background: var(--bg); color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      overflow: hidden; }

    /* ── Screens ── */
    .screen { display: none; flex-direction: column; width: 100%; height: 100dvh;
      position: absolute; top: 0; left: 0; }
    .screen.active { display: flex; }

    /* ── Lang toggle ── */
    .lang-btn {
      position: fixed; top: 14px; right: 14px; z-index: 999;
      background: var(--surface); border: 1px solid var(--navy);
      color: var(--light); font-size: 12px; font-weight: 700;
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      letter-spacing: 0.5px;
    }
    html[dir=rtl] .lang-btn { right: auto; left: 14px; }

    /* ── IDLE ── */
    #s-idle { background: var(--bg); }
    .topbar { display: flex; justify-content: center; align-items: center;
      padding: 14px 16px 6px; flex-shrink: 0; }
    .chevron { color: var(--muted); font-size: 20px; line-height: 1; }

    .viewfinder { flex: 1; margin: 0 16px; background: var(--surface);
      border-radius: 20px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; overflow: hidden; }
    .viewfinder img.logo { width: 400px; height: 400px; object-fit: contain; }
    .vf-title { font-size: 20px; font-weight: 600; color: var(--white); }
    .vf-sub { font-size: 14px; color: rgba(204,221,238,0.7); text-align: center;
      padding: 0 32px; line-height: 1.5; }

    .bottom-controls { display: flex; align-items: center; justify-content: space-between;
      padding: 24px 40px; padding-bottom: max(32px, env(safe-area-inset-bottom));
      flex-shrink: 0; }
    .icon-btn { width: 48px; height: 48px; background: var(--surface);
      border: 1px solid var(--muted); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; flex-shrink: 0; }
    .icon-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
    .icon-btn svg { width: 22px; height: 22px; fill: var(--light); }
    .capture-wrap { display: flex; flex-direction: column; align-items: center;
      gap: 6px; cursor: pointer; position: relative; }
    .capture-wrap input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
    .capture-ring { width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid var(--white); display: flex; align-items: center; justify-content: center; }
    .capture-core { width: 58px; height: 58px; border-radius: 50%; background: var(--white); }
    .capture-label { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 1.2px; }
    .spacer-ctrl { width: 48px; }

    /* ── ANALYZING ── */
    #s-analyzing { background: var(--bg); padding-bottom: 80px; }
    .preview-box { flex: 1; margin: 0 16px; border-radius: 20px; overflow: hidden;
      position: relative; background: var(--surface); }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .analyzing-overlay { position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; }
    .analyzing-box { background: rgba(13,17,23,0.65); border-radius: 16px;
      padding: 24px 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(77,117,158,0.3);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .analyzing-text { font-size: 16px; color: var(--white); }

    /* ── RESULT ── */
    #s-result { background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .result-topbar { display: flex; align-items: center; padding: 12px 16px 6px; flex-shrink: 0; }
    .close-btn { width: 36px; height: 36px; background: var(--surface); border-radius: 50%;
      border: none; color: var(--white); font-size: 16px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .flex1 { flex: 1; }

    .image-area { margin: 0 16px; border-radius: 20px; overflow: hidden;
      position: relative; background: var(--surface); min-height: 50vh; flex-shrink: 0; }
    .image-area > img { width: 100%; max-height: 50vh; object-fit: cover; display: block; }
    .img-gradient { position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 25%, rgba(13,17,23,0.88) 100%); }
    .img-overlay { position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .r-quality-title { font-size: 14px; color: rgba(204,221,238,0.8); }
    .r-pct { font-size: 52px; font-weight: 700; line-height: 1; color: var(--white); }
    .r-name { font-size: 16px; font-weight: 500; }

    .verdict-badge { margin-top: 10px; padding: 10px 14px; border-radius: 12px;
      display: flex; align-items: center; gap: 10px; width: 100%; }
    .verdict-badge.good { background: rgba(27,94,32,0.6); border: 1px solid rgba(76,175,80,0.4); }
    .verdict-badge.bad  { background: rgba(183,28,28,0.6); border: 1px solid rgba(244,67,54,0.4); }
    .verdict-badge-icon { font-size: 22px; flex-shrink: 0; }
    .verdict-badge-text { font-size: 13px; font-weight: 500; color: var(--white); line-height: 1.4; }

    .bortle-wrap { margin-top: 14px; width: 100%; }
    .bortle-bar-track { position: relative; height: 24px; }
    .bortle-track { position: absolute; left: 0; right: 0; top: 10px; height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #4CAF50, #8BC34A, #FFEB3B, #FF9800, #F44336); }
    .bortle-indicator { position: absolute; top: 4px; width: 16px; height: 16px;
      border-radius: 50%; background: var(--white); border: 2px solid var(--surface);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5); transform: translateX(-50%); }
    html[dir=rtl] .bortle-track { background: linear-gradient(to left, #4CAF50, #8BC34A, #FFEB3B, #FF9800, #F44336); }
    .bortle-labels { display: flex; justify-content: space-between; margin-top: 6px; }
    .b-lbl { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .b-lbl-num { font-size: 11px; font-weight: 600; }
    .b-lbl-name { font-size: 9px; color: var(--muted); }

    .btn-outline { margin-top: 14px; width: 100%; padding: 13px;
      background: transparent; border: 1px solid var(--navy); border-radius: 12px;
      color: var(--white); font-size: 15px; font-weight: 600; cursor: pointer; }

    .cards { padding: 12px 16px 40px; display: flex; flex-direction: column; gap: 8px; }
    .card { background: var(--surface); border-radius: 16px; padding: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-title-txt { font-size: 14px; font-weight: 600; color: var(--white); }
    .bortle-badge { font-size: 12px; font-weight: 600; color: var(--accent);
      background: rgba(30,58,95,0.3); padding: 4px 10px; border-radius: 8px; }
    .metric-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .metric-lbl { font-size: 13px; color: var(--muted); }
    .metric-val { font-size: 13px; font-weight: 500; color: var(--light); }

    .hist-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .hist-lbl { font-size: 11px; color: var(--muted); }
    #histogram-canvas { width: 100%; height: 100px; display: block; }
    canvas#hidden { display: none; }
  </style>
</head>

// ── Analysis logic ─────────────────────────────────────────────────────────────
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ── Pixel analysis (same as ImageAnalysisService + BortleClassifier) ──
function analyzePixels(imageData){
  const d=imageData.data, total=imageData.width*imageData.height;
  let tb=0,bp=0,dp=0,gp=0,tbl=0,tor=0,tr=0,tg=0,tbr=0;
  const hist=new Array(256).fill(0), brs=[];
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const br=(0.299*r+0.587*g+0.114*b)/255;
    brs.push(br); tb+=br;
    hist[Math.min(255,Math.floor(br*255))]++;
    if(br>0.6)bp++; if(br<0.15)dp++;
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
    const sat=mx>0?(mx-mn)/mx:0;
    if(sat<0.25&&br>=0.12&&br<=0.90)gp++;
    const s=r+g+b;
    if(s>0){tbl+=b/s;tor+=(r*0.7+g*0.3)/s;}
    tr+=r;tg+=g;tbr+=b;
  }
  const mean=tb/total;
  brs.sort((a,b)=>a-b);
  const median=brs[Math.floor(brs.length/2)];
  let sq=0; for(const v of brs)sq+=(v-mean)**2;
  return{meanBrightness:mean,medianBrightness:median,
    brightPixelRatio:bp/total,darkPixelRatio:dp/total,
    blueRatio:tbl/total,orangeRatio:tor/total,
    brightnessStdDev:Math.sqrt(sq/total),
    brightnessHistogram:hist,grayPixelRatio:gp/total,
    meanR:tr/total,meanG:tg/total,meanB:tbr/total};
}

// heuristic pollution score 0..1 (0=dark/good, 1=polluted)
function heuristicPollution(m){
  const bs=clamp(m.meanBrightness,0,1);
  const bts=clamp(m.brightPixelRatio,0,1);
  const ds=clamp(1-m.darkPixelRatio,0,1);
  const cs=clamp(m.orangeRatio-m.blueRatio+0.5,0,1);
  const u=m.meanBrightness>0.3?clamp(1-m.brightnessStdDev,0,1):clamp(m.brightnessStdDev,0,1);
  let raw=clamp(bs*0.35+bts*0.20+ds*0.15+cs*0.15+u*0.15,0,1);
  let ep=0;
  if(m.blueRatio<0.27){ep+=clamp((0.27-m.blueRatio)/0.10,0,1)*0.6;if(m.brightPixelRatio>0.02)ep+=0.3;}
  if(m.meanBrightness>0.30)ep+=clamp((m.meanBrightness-0.30)/0.20,0,1)*0.7;
  if(m.grayPixelRatio>0.30&&m.meanBrightness>0.20)ep+=clamp((m.grayPixelRatio-0.30)/0.30,0,1)*0.4;
  if(m.meanBrightness>0.45)ep=Math.max(ep,0.85);
  return clamp(raw+clamp(ep,0,1)*(1-raw),0,1);
}

}

function extractFeatures(imageData){
  const d=imageData.data, n=imageData.width*imageData.height;
  const brs=new Float32Array(n);
  let tBr=0,tDk=0,tVDk=0,tMd=0,tBlu=0,tRed=0,tOr=0,tCt=0;
  for(let i=0,idx=0;i<d.length;i+=4,idx++){
    const r=d[i]/255,g=d[i+1]/255,b=d[i+2]/255;
    const br=0.299*r+0.587*g+0.114*b;
    brs[idx]=br;
    if(br>0.6)tBr++;if(br<0.15)tDk++;if(br<0.05)tVDk++;
    if(br>0.2&&br<0.5)tMd++;
    const s=r+g+b+1e-7;
    tBlu+=b/s;tRed+=r/s;tOr+=(r*0.7+g*0.3)/s;tCt+=b-r;
  }
  let mean=0;for(const v of brs)mean+=v;mean/=n;
  const sorted=[...brs].sort((a,b)=>a-b);
  const median=sorted[Math.floor(sorted.length/2)];
  let sq=0;for(const v of brs)sq+=(v-mean)**2;
  const std=Math.sqrt(sq/n);
  const p90=sorted[Math.floor(n*0.9)],p10=sorted[Math.floor(n*0.1)];
  const hist=new Float32Array(8);
  for(const v of brs)hist[Math.min(7,Math.floor(v*8))]+=1/n;
  const unif=1-Math.min(std*3,1);
  return[mean,median,std,tBr/n,tDk/n,tVDk/n,tMd/n,tBlu/n,tRed/n,tOr/n,tCt/n,
    unif,p90,p10,sorted[0],sorted[sorted.length-1],hist[0],hist[1],hist[6],hist[7]];
}

function dartMlScore(features){
  const norm=features.map((v,i)=>(v-W.means[i])/W.stds[i]);
  const h1=denseRelu(norm,W.w1,W.b1,20,64);
  const h2=denseRelu(h1,W.w2,W.b2,64,32);
  const out=denseSigmoid(h2,W.w3,W.b3,32,1);
  return Math.round(clamp(out[0]*100,0,100));
}

// ── Full classify (matches analysis_provider.dart) ──
function fullClassify(m,imageData){
  // Heuristic score (inverted to quality 0-100)
  const pollution=heuristicPollution(m);
  const heuristicScore=Math.round((1-pollution)*100);

  // DartML score
  const features=extractFeatures(imageData);
  const mlScore=dartMlScore(features);

  // Hybrid: 70% ML + 30% heuristic
  let hybrid=Math.round(mlScore*0.7+heuristicScore*0.3);

  // Hard caps (same as analysis_provider.dart)
  if(m.meanBrightness>0.45) hybrid=clamp(hybrid,0,5);
  else if(m.blueRatio<0.25&&m.brightPixelRatio>0.02) hybrid=clamp(hybrid,0,10);
  else if(m.meanBrightness>0.30&&m.blueRatio<0.28) hybrid=clamp(hybrid,0,15);
  else if(m.meanBrightness>0.35) hybrid=clamp(hybrid,0,20);

  hybrid=clamp(hybrid,0,100);

  // Bortle (inverted: 100=Bortle1, 0=Bortle9)
  const bv=clamp(Math.round(((100-hybrid)/100)*8+1),1,9);
  const isCloudy=m.grayPixelRatio>0.15&&m.meanBrightness>0.12;
  return{skyQuality:hybrid,bortleValue:bv,isCloudy};
}

function qualityLabel(q,c){
  const ql=T[lang].qualityLabels;
  if(c&&q<25)return ql[7];
  if(q>=90)return ql[6];if(q>=75)return ql[5];
  if(q>=60)return ql[4];if(q>=45)return ql[3];
  if(q>=30)return ql[2];if(q>=15)return ql[1];
  return ql[0];
}
function qualityColor(q){
  if(q>=90)return'#00C853';if(q>=75)return'#66BB6A';
  if(q>=60)return'#8BC34A';if(q>=45)return'#FFEB3B';
  if(q>=30)return'#FF9800';if(q>=15)return'#FF5722';
  return'#F44336';
}
function verdictFor(q,c){
  const vs=T[lang].verdicts;
  if(q>=80)return{good:true,...vs[5]};
  if(q>=60)return{good:true,...vs[4]};
  if(q>=45)return{good:true,...vs[3]};
  if(q>=30)return{good:false,...vs[2]};
  if(q>=15)return{good:false,...vs[1]};
  if(c)return{good:false,...vs[6]};
  return{good:false,...vs[0]};
}

function drawHistogram(hist){
  const canvas=document.getElementById('histogram-canvas');
  const dpr=window.devicePixelRatio||1;
  const W2=canvas.offsetWidth*dpr,H=100*dpr;
  canvas.width=W2;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const BINS=64,bpg=Math.floor(hist.length/BINS),grouped=[];
  for(let i=0;i<BINS;i++){let s=0;for(let j=0;j<bpg;j++){const idx=i*bpg+j;if(idx<hist.length)s+=hist[idx];}grouped.push(s);}
  const gmax=Math.max(...grouped)||1,bw=W2/BINS;
  ctx.fillStyle='#1A2633';ctx.fillRect(0,0,W2,H);
  for(let i=0;i<BINS;i++){
    const ratio=grouped[i]/gmax,bh=ratio*H,t=i/BINS;
    const rv=Math.round(30+t*(77-30)),gv=Math.round(39+t*(117-39)),bv=Math.round(63+t*(158-63));
    ctx.fillStyle=`rgb(${rv},${gv},${bv})`;
    ctx.beginPath();ctx.roundRect(i*bw,H-bh,bw-1,bh,1);ctx.fill();
  }
}

// ── State ──
let objURL=null,lastResult=null;
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function handleFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  if(objURL)URL.revokeObjectURL(objURL);
  objURL=URL.createObjectURL(file);
  document.getElementById('analyzing-img').src=objURL;
  show('s-analyzing');
  const img=new Image();img.src=objURL;
  img.onload=()=>{
    const MAX=100; // match dart_ml_service (100x100)
    let w=img.naturalWidth,h=img.naturalHeight;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    const hc=document.getElementById('hidden');hc.width=w;hc.height=h;
    const ctx=hc.getContext('2d');ctx.drawImage(img,0,0,w,h);
    const data=ctx.getImageData(0,0,w,h);
    // Use 500px for pixel analysis
    const MAX2=500;let w2=img.naturalWidth,h2=img.naturalHeight;
    if(w2>MAX2){h2=Math.round(h2*MAX2/w2);w2=MAX2;}
    hc.width=w2;hc.height=h2;ctx.drawImage(img,0,0,w2,h2);
    const data2=ctx.getImageData(0,0,w2,h2);
    setTimeout(()=>{
      const m=analyzePixels(data2);
      // Get ML features from 100x100
      hc.width=w;hc.height=h;ctx.drawImage(img,0,0,w,h);
      const dataSmall=ctx.getImageData(0,0,w,h);
      const{skyQuality:q,bortleValue:bv,isCloudy:c}=fullClassify(m,dataSmall);
      lastResult=[q,bv,c,m];
      showResult(q,bv,c,m);
    },700);
  };
}

function showResult(q,bv,c,m){
  const color=qualityColor(q),label=qualityLabel(q,c),v=verdictFor(q,c);
  document.getElementById('result-img').src=objURL;
  document.getElementById('r-pct').textContent=q+'%';
  document.getElementById('r-pct').style.color=color;
  document.getElementById('r-name').textContent=label;
  document.getElementById('r-name').style.color=color;
  const badge=document.getElementById('r-verdict');
  badge.className='verdict-badge '+(v.good?'good':'bad');
  document.getElementById('r-v-icon').textContent=v.icon;
  document.getElementById('r-v-text').textContent=v.text;
  const pos=((bv-1)/8)*100;
  document.getElementById('r-dot').style.left=pos+'%';
  document.getElementById('r-bortle-badge').textContent=t('bortlePrefix')+' '+bv;
  document.getElementById('d-brightness').textContent=(m.meanBrightness*100).toFixed(1)+'%';
  document.getElementById('d-bright').textContent=(m.brightPixelRatio*100).toFixed(1)+'%';
  document.getElementById('d-dark').textContent=(m.darkPixelRatio*100).toFixed(1)+'%';
  document.getElementById('d-blue').textContent=m.blueRatio.toFixed(3);
  document.getElementById('d-orange').textContent=m.orangeRatio.toFixed(3);
  show('s-result');
  applyLang();
  setTimeout(()=>drawHistogram(m.brightnessHistogram),50);
}

document.getElementById('gallery-input').addEventListener('change',e=>{handleFile(e.target.files[0]);e.target.value='';});
document.getElementById('capture-input').addEventListener('change',e=>{handleFile(e.target.files[0]);e.target.value='';});
document.getElementById('close-btn').addEventListener('click',()=>show('s-idle'));
document.getElementById('r-reexamine').addEventListener('click',()=>show('s-idle'));

applyLang();
</script>
